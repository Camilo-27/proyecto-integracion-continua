version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: todo_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tododb
    ports:
      - "3307:3306"
    networks:
      - todo-network

  backend:
    build: ./backend
    container_name: todo_backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: tododb
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - todo-network

  frontend:
    build: ./frontend
    container_name: todo_frontend
    ports:
      - "8080:80"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge